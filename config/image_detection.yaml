# Lower intensity percentile to clip before normalization. Increasing this value filters out more of the dimmest pixel values, removing low-end noise but possibly suppressing faint filaments. Decreasing lets more background through, which may lead to noisier detection.
clip_low_percentile: 0.0
# Upper intensity percentile for normalization. Lowering this value clips more high-end pixels, reducing the effect of very bright spots; increasing includes more bright signal, possibly causing less contrast.
clip_high_percentile: 100.0

# The sigma for Gaussian blur applied to denoise the image. Higher values cause stronger smoothing, reducing noise but potentially blurring fine filament features. Lower values preserve detail but allow more noise.
gaussian_sigma: 2.5

# Percentile above which pixels are considered as foreground/possible filaments. Raising this value leads to more selective (fewer) pixels classified as filaments, potentially missing faint ones. Lowering it detects more filaments but may include more noise.
foreground_percentile: 99.5

# Size of the window (must be odd) used for adaptive thresholding. Larger values make the thresholding less sensitive to local variations, possibly missing tiny features. Smaller values increase sensitivity to local changes, at the risk of noise artifacts.
local_block_size: 35
# Offset subtracted from the local threshold. Making this more negative makes thresholding more permissive (includes more pixels as filaments), while less negative (even positive) excludes fainter structures.
local_offset: -0.01

# Scales used for the Frangi vesselness filter. Including more/larger values enhances filaments of various widths but may introduce artifacts if too wide relative to the image content.
frangi_sigmas: [1.0, 2.0, 3.0]
# Percentile threshold for Frangi filter output. Raising this keeps only the strongest filament features (more selective), while lowering retains weaker filament responses (less selective, possibly noisier).
frangi_threshold_percentile: 99.5

# Minimum number of pixels to retain a detected object as a filament. Higher values filter out small noise but may remove small/fragmented filaments; lower values might include more spurious detections.
min_object_size: 25

# Minimum pixels for calling a filament "present." Raising this makes detection more conservative, requiring larger features; lowering allows detection of smaller or fainter filaments as "present."
min_pixels_for_presence: 20

# Dots per inch used in output figures. Higher means larger, sharper images. Lower for faster rendering.
figure_dpi: 140
# Colormap used for displaying images. Typically "gray" for fluorescence microscopy. Switching changes visual appearance only.
cmap: "gray"

# Required for batch runs: parent folder containing ``brightfield/`` and ``gfp/`` frame trees.
dataset_directory: "data/separated_frames"
# Runs are written to ``<results_directory>/<run_uuid>/`` (filament_mask/, diagnostics/, copies of bf/gfp).
results_directory: "temp/results"

# When true, print progress (paths found per movie, saves, warnings). Set false for quieter logs in batch jobs.
verbose: true
# Number of parallel worker processes for filament detection over many images. Higher can speed up I/O-bound runs; too high may exhaust RAM or GPU context switches if models load per worker.
max_workers: 6
# Human-readable label stored in run metadata alongside the UUID; does not change on-disk layout.
run_name: "test_run"

model_type_bf: "cyto3"
model_type_gfp: "cyto3"
diameter_bf: null
diameter_gfp: null
channels_bf: [0, 0]
channels_gfp: [0, 0]
use_gpu: false
pillar_iou_threshold: 0.10
min_area_bf: 50
min_area_gfp: 20
use_existing_cell_masks: false
max_link_distance: 60
min_overlap_fraction: 0.15
bud_distance: 35
bud_overlap_fraction: 0.05
max_filament_gap: 1

# If true, drop cell tracks matching the v3_aggressive pillar rule before filament assignment; writes ``removed_pillar_tracks_v3.csv`` under statistics/.
remove_pillar_tracks: false
pillar_v3_min_track_frames: 3
pillar_v3_max_motion_std: 3.0
pillar_v3_min_eccentricity: 0.68
pillar_v3_min_aspect_ratio: 1.35
pillar_v3_min_solidity: 0.94
